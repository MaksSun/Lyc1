title: "Информатика: Вариант 1"
class: "7М"
questions:
  - id: q1
    type: multichoice
    prompt: "Выберите устройства ввода информации и запищите в ответе их номера в порядке возрастания."
    options:
      - id: "1"
        label: "мышь"
      - id: "2"
        label: "графический планшет"
      - id: "3"
        label: "датчики движения"
      - id: "4"
        label: "жёсткий диск"
      - id: "5"
        label: "колонки"
      - id: "6"
        label: "монитор"
      - id: "7"
        label: "USB-флеш-накопитель"
      - id: "8"
        label: "клавиатура"
    answer: ["1", "2", "3", "8"]
    points: 1

  - id: q2
    type: choice
    prompt: "В некотором каталоге хранился файл «Печенье.docx». После того как в этом каталоге создали подкаталог «Рецепты» и переместили в него файл «Печенье.docx», полное имя файла стало «D:ДокументыИдеиРецептыПеченье.docx». Укажите полное имя этого файла до перемещения."
    options:
      - id: "1"
        label: "D:ДокументыИдеи"
      - id: "2"
        label: "D:ИдеиДокументыПеченье.docx"
      - id: "3"
        label: "D:ДокументыИдеиПеченье.docx"
      - id: "4"
        label: "D:РецептыИдеиПеченье.docx"
    answer: "3"
    points: 1

  - id: q3
    type: matching_multi
    prompt: "Установите соответствие между расширениями и типами файлов."
    left_items:
      - id: A
        label: ".gif"
      - id: B
        label: ".mov"
      - id: C
        label: ".png"
      - id: D
        label: ".jpg"
      - id: E
        label: ".rar"
      - id: F
        label: ".mp4"
      - id: G
        label: ".mp3"
    right_items:
      - id: "1"
        label: "видеофайл"
      - id: "2"
        label: "звуковой файл"
      - id: "3"
        label: "архив"
      - id: "4"
        label: "графический файл"
    answer:
      A: "4"
      B: "1"
      C: "4"
      D: "4"
      E: "3"
      F: "1"
      G: "2"
    points: 1

  - id: q4
    type: ordering
    prompt: "Доступ к файлу flower.png, находящемуся на сервере summer.org, осуществляется по протоколу https. Фрагменты адреса файла закодированы буквами от a до g. Запишите последовательность этих букв, кодирующую адрес указанного файла в сети Интернет."
    items:
      - id: "a"
        label: "https"
      - id: "b"
        label: "://"
      - id: "c"
        label: "flower."
      - id: "d"
        label: ".org"
      - id: "e"
        label: "png"
      - id: "f"
        label: "/"
      - id: "g"
        label: "summer"
    answer: ["a", "b", "g", "d", "f", "c", "e"]
    points: 1

  - id: q5
    type: ordering
    prompt: "В таблице приведены запросы к поисковому серверу. Для каждого запроса указан его код — соответствующая буква от a до d. Расположите коды запросов слева направо в порядке возрастания количества страниц, которые нашёл поисковый сервер по каждому запросу. Для обозначения логической операции «ИЛИ» в запросе используется символ «|», а для логической операции «И» — символ «&»."
    items:
      - id: "a"
        label: "Сказка | Кот | Сапоги"
      - id: "b"
        label: "Сказка | Сапоги"
      - id: "c"
        label: "Сказка & Кот"
      - id: "d"
        label: "Сказка & Кот & Сапоги"
    answer: ["d", "c", "b", "a"]
    points: 1

  - id: q6
    type: matching
    prompt: "В лагере встретились четыре мальчика: Иван, Пётр, Владимир, Алексей. Фамилии мальчиков — Иванов, Петров, Владимиров, Алексеев. Известно, что ни у одного мальчика имя и фамилия не совпадают. По вечерам Владимир, Алексей, Иванов и Петров часто играли в настольные игры. Какая фамилия у каждого мальчика?"
    left_items:
      - id: A
        label: "Иван"
      - id: B
        label: "Пётр"
      - id: C
        label: "Владимир"
      - id: D
        label: "Алексей"
    right_items:
      - id: "1"
        label: "Иванов"
      - id: "2"
        label: "Петров"
      - id: "3"
        label: "Владимиров"
      - id: "4"
        label: "Алексеев"
    answer:
      A: "2"
      B: "3"
      C: "4"
      D: "1"
    points: 1

  - id: q7
    type: shorttext
    prompt: "От разведчика была получена следующая радиограмма, зашифрованная с использованием азбуки Морзе: ·− −·−· ·− −·−−. При передаче радиограммы было потеряно разбиение на буквы, но известно, что в радиограмме использовались только следующие буквы: А (·−), Б (−···), Л (·−··), О (−−−), П (·−−·). Расшифруйте радиограмму."
    answer: "АЛЛА"
    points: 1

  - id: q8
    type: number
    prompt: "Сколько видеофайлов размером 256 Мбайт может уместиться на Flash-карте объёмом 4 Гбайт?"
    answer: 16
    points: 1

  - id: q9
    type: number
    prompt: "Сообщение, записанное буквами 32-символьного алфавита, содержит 80 символов. Чему равен информационный объём этого сообщения в байтах?"
    answer: 50
    points: 1

  - id: q10
    type: number
    prompt: "Скорость передачи данных через некоторое соединение равна 3 072 000 бит/с. Передача файла через данное соединение заняла 8 секунд. Определите размер файла в Кбайт."
    answer: 3000
    points: 1

  - id: q11
    type: number
    prompt: "В одной из кодировок Unicode каждый символ кодируется 16 битами. Определите информационный объём в байтах следующего предложения в данной кодировке: «Я помню чудное мгновенье: Передо мной явилась ты»"
    answer: 114
    points: 1